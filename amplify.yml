version: 1
frontend:
  phases:
    preBuild:
      commands:
        - yarn install --frozen-lockfile
        - yarn ampx generate outputs --app-id d2abcyagvq3j4o --branch main --out-dir .
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
